<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 380" width="380" height="380">
  <defs>
    <radialGradient id="esclerotica" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#F0EDE8"/>
      <stop offset="100%" stop-color="#D8D4CC"/>
    </radialGradient>
    <radialGradient id="uvea" cx="50%" cy="50%" r="50%">
      <stop offset="85%" stop-color="#7B3F20"/>
      <stop offset="100%" stop-color="#5A2810"/>
    </radialGradient>
    <radialGradient id="vitreo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E8F4FF"/>
      <stop offset="100%" stop-color="#C8E4F8"/>
    </radialGradient>
    <radialGradient id="irisBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="60%" stop-color="#6B4F10"/>
      <stop offset="100%" stop-color="#4A3208"/>
    </radialGradient>
    <linearGradient id="cornea" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D8EEFF"/>
      <stop offset="50%" stop-color="#E8F6FF"/>
      <stop offset="100%" stop-color="#D8EEFF"/>
    </linearGradient>
    <linearGradient id="bgOlho" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F2EE"/>
      <stop offset="100%" stop-color="#E8E3DC"/>
    </linearGradient>
    <filter id="blur3">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <clipPath id="eyeClip">
      <circle cx="190" cy="190" r="130"/>
    </clipPath>
  </defs>

  <rect width="380" height="380" fill="url(#bgOlho)" rx="12"/>

  <!-- ══ GLOBO OCULAR ══ -->

  <!-- Esclera (branca) -->
  <circle cx="190" cy="190" r="130" fill="url(#esclerotica)" stroke="#C8C0B4" stroke-width="2.5"/>

  <!-- Coróide / Úvea -->
  <circle cx="190" cy="190" r="126" fill="url(#uvea)" opacity="0.25"/>

  <!-- Humor vítreo -->
  <circle cx="196" cy="195" r="96" fill="url(#vitreo)" opacity="0.55"/>

  <!-- ══ RETINA (arco posterior) ══ -->
  <path d="M 80 150 Q 65 190 80 230 Q 88 250 100 260" fill="none" stroke="#E8A090" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <!-- Camada retiniana mais interna (detalhe) -->
  <path d="M 82 152 Q 68 190 82 228 Q 90 248 101 258" fill="none" stroke="#FF9988" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- ══ DISCO ÓPTICO + NERVO ÓPTICO ══ -->
  <!-- Nervo óptico saindo -->
  <rect x="46" y="176" width="42" height="28" rx="4" fill="#D4A070" stroke="#C09060" stroke-width="1"/>
  <rect x="46" y="178" width="42" height="10" rx="2" fill="#E8C090" opacity="0.6"/>
  <!-- Disco óptico na retina -->
  <ellipse cx="90" cy="190" rx="12" ry="16" fill="#FFD060" stroke="#D4A030" stroke-width="1.5"/>
  <ellipse cx="90" cy="190" rx="6" ry="8" fill="#FFF0A0"/>
  <!-- Vasos no disco -->
  <line x1="84" y1="174" x2="90" y2="206" stroke="#CC3300" stroke-width="2" opacity="0.6"/>
  <line x1="78" y1="190" x2="102" y2="190" stroke="#881500" stroke-width="2.5" opacity="0.55"/>

  <!-- ══ MÁCULA E FÓVEA ══ -->
  <ellipse cx="108" cy="195" rx="14" ry="12" fill="#B86040" opacity="0.45"/>
  <circle cx="108" cy="195" r="4" fill="#803020" opacity="0.7"/>
  <circle cx="107" cy="194" r="1.5" fill="#FF9966" opacity="0.5"/>

  <!-- ══ CRISTALINO ══ -->
  <ellipse cx="248" cy="190" rx="18" ry="38" fill="#DDF0FF" stroke="#A0C8E0" stroke-width="1.5" opacity="0.8"/>
  <ellipse cx="245" cy="185" rx="6" ry="12" fill="white" opacity="0.3"/>

  <!-- ══ IRIS E PUPILA ══ -->
  <ellipse cx="278" cy="190" rx="20" ry="44" fill="url(#irisBg)" opacity="0.9"/>
  <!-- Textura iris -->
  <ellipse cx="278" cy="190" rx="16" ry="36" fill="none" stroke="#8B6914" stroke-width="0.8" opacity="0.4"/>
  <ellipse cx="278" cy="190" rx="12" ry="28" fill="none" stroke="#6B4F10" stroke-width="0.8" opacity="0.4"/>
  <!-- Pupila -->
  <ellipse cx="278" cy="190" rx="8" ry="18" fill="#0A0A0A"/>
  <!-- Reflexo -->
  <ellipse cx="275" cy="182" rx="3" ry="5" fill="white" opacity="0.25"/>

  <!-- ══ CÂMARA ANTERIOR ══ -->
  <path d="M 278 146 Q 302 170 302 190 Q 302 210 278 234 L 248 228 Q 266 210 266 190 Q 266 170 248 152 Z" fill="#E8F8FF" opacity="0.35"/>

  <!-- ══ CÓRNEA ══ -->
  <path d="M 278 146 Q 320 168 320 190 Q 320 212 278 234" fill="url(#cornea)" stroke="#A0C8E0" stroke-width="2" fill-opacity="0.6"/>

  <!-- ══ VASOS RETINIANOS (visíveis no fundo) ══ -->
  <g clip-path="url(#eyeClip)" opacity="0.6">
    <!-- Artérias -->
    <path d="M 90 174 Q 95 155 105 145 Q 118 132 130 128 Q 148 120 165 118" stroke="#CC3300" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 90 206 Q 96 225 107 238 Q 118 250 133 255 Q 148 262 165 262" stroke="#CC3300" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Veias -->
    <path d="M 90 178 Q 96 158 108 148 Q 122 134 136 130 Q 152 122 168 120" stroke="#881500" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M 90 202 Q 97 222 110 234 Q 122 246 137 252 Q 152 258 168 260" stroke="#881500" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- ══ LEGENDA CAMADAS ══ -->
  <!-- Linha para esclera -->
  <line x1="190" y1="62" x2="190" y2="72" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="155" y="46" width="70" height="16" rx="4" fill="#E8E4DE" stroke="#C8C0B4" stroke-width="0.8"/>
  <text x="190" y="57" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#555">Esclera</text>

  <!-- Linha para retina -->
  <line x1="70" y1="175" x2="82" y2="180" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="10" y="164" width="58" height="16" rx="4" fill="#FFE8E0" stroke="#E09080" stroke-width="0.8"/>
  <text x="39" y="175" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#C05040" font-weight="bold">Retina ★</text>

  <!-- Linha para disco óptico -->
  <line x1="68" y1="145" x2="84" y2="174" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="10" y="132" width="70" height="16" rx="4" fill="#FFF8DC" stroke="#D4A030" stroke-width="0.8"/>
  <text x="45" y="143" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#996600">Disco óptico</text>

  <!-- Linha para nervo óptico -->
  <line x1="46" y1="200" x2="36" y2="213" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="0" y="212" width="72" height="16" rx="4" fill="#EDE8FF" stroke="#9966CC" stroke-width="0.8"/>
  <text x="36" y="223" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#7744AA">N. óptico</text>

  <!-- Linha para mácula -->
  <line x1="108" y1="207" x2="108" y2="220" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="76" y="220" width="64" height="16" rx="4" fill="#FFE8D0" stroke="#D08040" stroke-width="0.8"/>
  <text x="108" y="231" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#905020">Mácula / fóvea</text>

  <!-- Linha para cristalino -->
  <line x1="248" y1="152" x2="248" y2="140" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="218" y="126" width="60" height="16" rx="4" fill="#E0F0FF" stroke="#A0C8E0" stroke-width="0.8"/>
  <text x="248" y="137" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3070A0">Cristalino</text>

  <!-- Linha para córnea -->
  <line x1="316" y1="170" x2="330" y2="158" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="324" y="144" width="52" height="16" rx="4" fill="#E0F0FF" stroke="#A0C8E0" stroke-width="0.8"/>
  <text x="350" y="155" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#3070A0">Córnea</text>

  <!-- Linha para íris -->
  <line x1="298" y1="200" x2="330" y2="215" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <rect x="324" y="212" width="48" height="16" rx="4" fill="#FFF8E8" stroke="#D4A030" stroke-width="0.8"/>
  <text x="348" y="223" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#805010">Íris / pupila</text>

  <!-- ══ DESTAQUE: retina como sensor sistêmico ══ -->
  <rect x="90" y="300" width="200" height="58" rx="8" fill="#1E3A5F" opacity="0.92"/>
  <text x="190" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="10.5" fill="#5BA3D9" font-weight="bold">★ A RETINA</text>
  <text x="190" y="334" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">Único tecido do corpo onde vasos</text>
  <text x="190" y="346" text-anchor="middle" font-family="sans-serif" font-size="9" fill="white">e neurônios são visíveis sem cirurgia</text>
  <text x="190" y="358" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#FFD080">→ Janela para a microangiopatia sistêmica</text>
</svg>
