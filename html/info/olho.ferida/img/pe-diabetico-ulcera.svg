<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" width="480" height="300">
  <defs>
    <linearGradient id="peleBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4C99E"/>
      <stop offset="100%" stop-color="#D9956A"/>
    </linearGradient>
    <linearGradient id="tecidoSub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0A070"/>
      <stop offset="100%" stop-color="#C87040"/>
    </linearGradient>
    <linearGradient id="musculo" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E07060"/>
      <stop offset="100%" stop-color="#C04040"/>
    </linearGradient>
    <linearGradient id="osso" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5EDD0"/>
      <stop offset="100%" stop-color="#DDD090"/>
    </linearGradient>
    <linearGradient id="ulceraBed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CC3322"/>
      <stop offset="60%" stop-color="#991100"/>
      <stop offset="100%" stop-color="#660800"/>
    </linearGradient>
    <linearGradient id="bgSvg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F9F7F4"/>
      <stop offset="100%" stop-color="#EEEBE5"/>
    </linearGradient>
    <filter id="shadow3">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000020"/>
    </filter>
  </defs>

  <rect width="480" height="300" fill="url(#bgSvg)" rx="10"/>

  <!-- ══ TITLE ══ -->
  <rect x="0" y="0" width="480" height="34" rx="10" fill="#1E3A5F"/>
  <rect x="0" y="24" width="480" height="10" fill="#1E3A5F"/>
  <text x="240" y="22" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white">Úlcera do Pé Diabético — Corte Esquemático</text>

  <!-- ══ PÉ LATERAL VIEW ══ -->
  <!-- Contorno do pé (vista lateral, planta voltada para baixo) -->
  <!-- Calcanhar esquerdo, planta, dedos direita -->
  <path d="
    M 60 240
    Q 55 230 58 210
    Q 62 185 75 175
    Q 90 165 110 170
    Q 130 155 145 148
    Q 165 140 185 142
    Q 205 140 225 138
    Q 255 130 280 125
    Q 310 118 335 122
    Q 360 126 375 135
    Q 390 143 395 158
    Q 398 170 390 182
    Q 382 195 368 200
    Q 355 205 340 202
    Q 325 198 315 192
    Q 300 184 290 182
    Q 275 178 260 182
    Q 248 185 240 190
    Q 228 196 215 200
    Q 200 205 185 208
    Q 170 210 155 210
    Q 140 210 130 215
    Q 115 222 105 232
    Q 95 242 85 248
    Q 75 252 65 248
    Q 58 244 60 240Z"
    fill="url(#peleBg)" stroke="#C07040" stroke-width="2" filter="url(#shadow3)"/>

  <!-- Subcutâneo (camada interna) -->
  <path d="
    M 68 235
    Q 63 222 68 205
    Q 75 188 90 180
    Q 108 172 125 177
    Q 142 162 158 155
    Q 175 147 195 148
    Q 215 146 235 144
    Q 262 136 285 131
    Q 312 125 335 129
    Q 358 133 370 142
    Q 382 152 384 165
    Q 385 177 377 188
    Q 368 196 355 198
    Q 340 200 328 195
    Q 312 188 300 187
    Q 280 182 262 188
    Q 248 191 237 197
    Q 222 202 207 206
    Q 192 209 177 210
    Q 162 210 150 214
    Q 135 220 120 228
    Q 105 236 95 240
    Q 82 244 72 240
    Q 68 238 68 235Z"
    fill="url(#tecidoSub)" opacity="0.7"/>

  <!-- Músculo -->
  <path d="
    M 78 228
    Q 82 210 95 195
    Q 112 180 130 183
    Q 150 170 168 163
    Q 188 155 210 156
    Q 230 152 252 150
    Q 275 144 298 140
    Q 320 136 342 142
    Q 362 148 370 160
    Q 375 170 370 180
    Q 362 189 348 193
    Q 330 195 316 188
    Q 298 182 278 186
    Q 258 190 244 197
    Q 228 202 210 204
    Q 192 207 175 207
    Q 158 206 145 212
    Q 130 218 115 227
    Q 102 233 90 236
    Q 82 236 78 228Z"
    fill="url(#musculo)" opacity="0.45"/>

  <!-- Osso metatarso (simplificado) -->
  <ellipse cx="310" cy="170" rx="38" ry="14" fill="url(#osso)" stroke="#CCBB80" stroke-width="1" opacity="0.85" transform="rotate(-10 310 170)"/>
  <ellipse cx="250" cy="175" rx="30" ry="11" fill="url(#osso)" stroke="#CCBB80" stroke-width="1" opacity="0.75" transform="rotate(-8 250 175)"/>

  <!-- Calcanhar osso -->
  <ellipse cx="95" cy="205" rx="28" ry="20" fill="url(#osso)" stroke="#CCBB80" stroke-width="1" opacity="0.8"/>

  <!-- ══ ÚLCERA (região plantar anterior — local típico) ══ -->
  <!-- Abertura superficial na pele -->
  <ellipse cx="315" cy="195" rx="32" ry="14" fill="#7B1010" transform="rotate(-12 315 195)"/>
  <!-- Leito da úlcera (profundo) -->
  <ellipse cx="315" cy="196" rx="26" ry="10" fill="url(#ulceraBed)" transform="rotate(-12 315 196)"/>
  <!-- Bordas irregulares / maceradas -->
  <path d="M 287 191 Q 292 183 300 188 Q 307 181 314 186 Q 320 180 328 185 Q 336 179 343 186 Q 348 183 353 190" fill="none" stroke="#AA2200" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Tecido necrótico escuro no centro -->
  <ellipse cx="315" cy="197" rx="10" ry="5" fill="#330000" opacity="0.6" transform="rotate(-12 315 197)"/>
  <!-- Exsudato purulento -->
  <ellipse cx="308" cy="193" rx="6" ry="3" fill="#C8A040" opacity="0.55" transform="rotate(-12 308 193)"/>
  <!-- Granulação vermelha nas bordas -->
  <path d="M 292 193 Q 295 198 300 195 Q 304 200 309 197 Q 313 202 319 198 Q 324 202 330 197 Q 335 200 340 195" fill="none" stroke="#FF6644" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>

  <!-- ══ VASOS COMPROMETIDOS (sob a úlcera) ══ -->
  <!-- Vaso trombosado -->
  <ellipse cx="315" cy="205" rx="8" ry="4" fill="#8B1500" opacity="0.6" transform="rotate(-10 315 205)"/>
  <ellipse cx="295" cy="202" rx="6" ry="3" fill="#7A1300" opacity="0.5" transform="rotate(-10 295 202)"/>

  <!-- Vaso periférico normal (para comparar) -->
  <path d="M 160 195 Q 200 190 240 192 Q 265 193 280 198" stroke="#CC3300" stroke-width="3" fill="none" opacity="0.5"/>
  <path d="M 160 200 Q 200 196 240 198 Q 265 199 280 203" stroke="#881500" stroke-width="4" fill="none" opacity="0.4"/>

  <!-- ══ NEUROPATIA (raios nervosos pontilhados) ══ -->
  <path d="M 185 210 Q 200 205 215 208 Q 230 205 245 207 Q 260 204 275 207" stroke="#9966CC" stroke-width="1.5" fill="none" stroke-dasharray="3,3" opacity="0.6"/>
  <path d="M 295 207 Q 305 205 320 207" stroke="#9966CC" stroke-width="1.5" fill="none" stroke-dasharray="3,3" opacity="0.35"/>

  <!-- ══ ANOTAÇÕES ══ -->
  <!-- Seta úlcera -->
  <line x1="315" y1="172" x2="315" y2="184" stroke="#D4541A" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="272" y="155" width="86" height="17" rx="4" fill="#D4541A" opacity="0.92"/>
  <text x="315" y="167" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="white" font-weight="bold">Úlcera plantar (Wagner II)</text>

  <!-- Seta neuropatia -->
  <line x1="230" y1="216" x2="230" y2="207" stroke="#9966CC" stroke-width="1.2"/>
  <rect x="188" y="217" width="84" height="15" rx="4" fill="#9966CC" opacity="0.85"/>
  <text x="230" y="228" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="white">Neuropatia periférica</text>

  <!-- Seta isquemia vascular -->
  <line x1="175" y1="215" x2="175" y2="202" stroke="#CC3300" stroke-width="1.2"/>
  <rect x="128" y="216" width="94" height="15" rx="4" fill="#CC3300" opacity="0.85"/>
  <text x="175" y="227" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="white">Isquemia vascular</text>

  <!-- Seta osso -->
  <line x1="310" y1="158" x2="310" y2="168" stroke="#887730" stroke-width="1.2"/>
  <rect x="273" y="145" width="74" height="14" rx="4" fill="#998840" opacity="0.85"/>
  <text x="310" y="155" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="white">Osso (risco osteomielite)</text>

  <!-- ══ ESCALA DE WAGNER LATERAL ══ -->
  <rect x="16" y="46" width="60" height="118" rx="6" fill="white" opacity="0.85" stroke="#CCC" stroke-width="0.8"/>
  <text x="46" y="60" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#1E3A5F" font-weight="bold">Wagner</text>
  <!-- Grade -->
  <rect x="20" y="64" width="52" height="16" rx="3" fill="#E8F5E9"/>
  <text x="46" y="75" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#2E7D32">0 — Pré-úlcera</text>
  <rect x="20" y="82" width="52" height="16" rx="3" fill="#FFF9C4"/>
  <text x="46" y="93" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#F57F17">I — Superficial</text>
  <rect x="20" y="100" width="52" height="16" rx="3" fill="#FFF3E0"/>
  <text x="46" y="112" text-anchor="middle" font-family="sans-serif" font-size="8.5" fill="#E65100" font-weight="bold">II — Profunda ◀</text>
  <rect x="20" y="118" width="52" height="16" rx="3" fill="#FFEBEE"/>
  <text x="46" y="130" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#C62828">III — Osteomielite</text>
  <rect x="20" y="136" width="52" height="16" rx="3" fill="#FCE4EC"/>
  <text x="46" y="147" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#880E4F">IV/V — Gangrena</text>

  <!-- ══ CORRELAÇÃO RETINA RODAPÉ ══ -->
  <rect x="12" y="272" width="456" height="22" rx="6" fill="#1E3A5F" opacity="0.9"/>
  <text x="240" y="287" text-anchor="middle" font-family="sans-serif" font-size="9.5" fill="white">
    ⚡ 90% dos pacientes com úlcera diabética têm Retinopatia Diabética — mesma microangiopatia, órgãos distintos  (Hwang et al., PLoS ONE 2017)
  </text>
</svg>
